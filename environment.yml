name: shap-drift
channels:
  - conda-forge
  - pytorch
  - nvidia
dependencies:
  - python=3.10
  - pip>=23.0

  # Core scientific
  - numpy>=1.21
  - pandas>=1.3
  - scipy>=1.7
  - scikit-learn>=1.0

  # ML models
  - xgboost>=1.5,<3.0

  # Visualization
  - matplotlib>=3.5
  - seaborn>=0.11

  # Progress & logging
  - tqdm

  # PyTorch with CUDA 12.4 (for 4090D)
  - pytorch>=2.0,<2.6
  - pytorch-cuda=12.4

  # pip packages
  - pip:
    - shap>=0.41.0
    - table-synthesizers>=0.1.0  # Unified 4 generators: BayesianNetwork, CTGAN, TVAE, TabDDPM
